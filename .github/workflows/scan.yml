name: Aqua Supply Chain Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Aqua Supply Chain Scanner
        run: |
          docker run \
            -e AQUA_KEY \
            -e AQUA_SECRET \
            -e TRIVY_RUN_AS_PLUGIN=aqua \
            -v ${{ github.workspace }}:/scanning \
            aquasec/trivy:latest \
            fs --scanners vuln,secret,misconfig --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL /scanning
        env:
          AQUA_KEY: ${{ secrets.AQUA_KEY }}
          AQUA_SECRET: ${{ secrets.AQUA_SECRET }}
